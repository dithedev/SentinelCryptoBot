name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: sentinel_crypto_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sentinel_crypto_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL_TEST: postgresql+asyncpg://postgres:password@localhost:5432/sentinel_crypto_test
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/sentinel_crypto_test
      BOT_TOKEN: "123456:ci-test-token"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Ruff check
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: Mypy
        run: mypy app

      - name: Pytest
        run: pytest -q
